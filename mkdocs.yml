# mkdocs.yml
site_name: ToDus SDK para Python
site_description: SDK oficial de ToDus para Python - Mensajería, grupos y más
site_author: Comunidad ToDus
site_url: https://vm1008079-web.github.io/toDus-API/
repo_url: https://github.com/vm1008079-web/toDus-API
repo_name: toDus-API
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  
  # === PALETA DE COLORES ===
  palette:
    # Modo claro
    - scheme: default
      primary: indigo        # Color principal (indigo, blue, cyan, teal, green, lime, amber, orange, deep-orange, red, pink, purple, deep-purple)
      accent: indigo         # Color de acento
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    
    # Modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  
  # === FUENTES ===
  font:
    text: Roboto
    code: JetBrains Mono
  
  # === ICONOS ===
  icon:
    logo: material/message-text   # Logo en la barra superior
    repo: fontawesome/brands/github
  
  # === CARACTERÍSTICAS ===
  features:
    - navigation.instant          # Navegación instantánea sin recargar
    - navigation.tracking         # Sigue la sección actual en la URL
    - navigation.sections         # Secciones expandidas
    - navigation.expand           # Expande todos los niveles
    - navigation.indexes          # Índices en la navegación
    - navigation.top              # Botón para volver arriba
    - toc.follow                  # Tabla de contenido sigue al leer
    - search.highlight            # Resalta resultados de búsqueda
    - search.share                # Compartir resultados de búsqueda
    - content.code.annotate       # Anotaciones en código
    - content.code.copy           # Botón para copiar código

# === PLUGINS ===
plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            merge_init_into_class: true
  - autorefs

# === EXTENSIONES DE MARKDOWN ===
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - def_list

# === NAVEGACIÓN ===
nav:
  - Inicio: index.md
  - Instalación: installation.md
  - Inicio Rápido: quickstart.md
  - Cliente ToDus:
      - Visión General: client/overview.md
      - Mixins (API Completa): client/mixins.md
  - Cola y Persistencia:
      - Visión General: cache/overview.md
      - Cliente con Cola: cache/queue_client.md
  - Grupos MUC Light: groups.md
  - Stanzas (Generación XML): stanzas/overview.md
  - Referencia API:
      - Parser: api/parser.md
      - Utilidades: api/utils.md
      - Tipos y Constantes: api/types_constants.md
      - Errores: api/errors.md

# === CSS Y JS EXTRA ===
extra_css:
  - stylesheets/extra.css

# === SOCIAL (opcional) ===
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vm1008079-web/toDus-API
      name: Repositorio en GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/todus-sdk/
      name: PyPI
