site_name: toDus-API
site_description: Cliente Python para ToDus (API no oficial).
site_author: ElJoker63
repo_name: ElJoker63/toDus-API
repo_url: https://github.com/ElJoker63/toDus-API

theme:
  name: material
  logo: https://raw.githubusercontent.com/ElJoker63/toDus-API/main/examples/avatar.png
  favicon: https://raw.githubusercontent.com/ElJoker63/toDus-API/main/examples/avatar.png
  palette:
    # Modo Claro (Rojo ToDus)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Cambiar al modo oscuro
    # Modo Oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Cambiar al modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

nav:
  - Inicio: index.md
  - Empezando:
    - Instalación: getting-started/installation.md
    - Primeros Pasos: getting-started/quickstart.md
  - Referencia de la API:
    - Cliente Core: api-reference/client.md
    - Mensajería: api-reference/messages.md
    - Grupos y Canales: api-reference/groups_channels.md
    - Archivos y Medios: api-reference/files.md
    - Perfil y Presencia: api-reference/profile_presence.md
    - Estados (Historias): api-reference/status.md
    - Bloqueos y Privacidad: api-reference/blocks_privacy.md
    - Avanzado (Ubicación, Llamadas, Last): api-reference/advanced.md
